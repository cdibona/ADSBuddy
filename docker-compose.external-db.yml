# Run ONLY the ADSBuddy app, against an EXTERNAL Postgres you manage elsewhere
# (no bundled `db` container). Good for low-write / SD-card-sparing setups — e.g.
# a Raspberry Pi already running adsb-im, with the database on a NAS or another
# host so the SD card isn't taking the write load.
#
# In .env, point at your database and (optionally) pin a release:
#   POSTGRES_HOST=192.168.1.50      # your external Postgres
#   POSTGRES_PORT=5432
#   POSTGRES_USER=adsbuddy
#   POSTGRES_PASSWORD=...
#   POSTGRES_DB=adsbuddy            # must already exist on that server
#   ADSBUDDY_IMAGE_TAG=1.0.1
#
# Then:
#   docker compose -f docker-compose.external-db.yml up -d
#
# The app runs `alembic upgrade head` on boot, so the POSTGRES_USER needs rights
# to create/alter tables in POSTGRES_DB.
services:
  app:
    image: ghcr.io/cdibona/adsbuddy:${ADSBUDDY_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      ADSBUDDY_SECRET_KEY: ${ADSBUDDY_SECRET_KEY}
      ADSBUDDY_ADMIN_USERNAME: ${ADSBUDDY_ADMIN_USERNAME}
      ADSBUDDY_ADMIN_PASSWORD: ${ADSBUDDY_ADMIN_PASSWORD}
      ADSBUDDY_TEST_MODE: ${ADSBUDDY_TEST_MODE:-0}
      ADSBUDDY_MODE: ${ADSBUDDY_MODE:-MultiUser}
      ADSBUDDY_RADIO_URL: ${ADSBUDDY_RADIO_URL:-}
    ports:
      # Where to bind the web port. Default 127.0.0.1 (localhost only; reach the
      # tailnet via Tailscale Serve). Set ADSBUDDY_BIND=0.0.0.0 for a LAN/tailnet
      # appliance, or a specific IP. Don't expose open mode on an untrusted network.
      - "${ADSBUDDY_BIND:-127.0.0.1}:${ADSBUDDY_PORT}:8000"

name: Release image

# Build the app image and push it to GHCR whenever a vX.Y.Z tag is pushed.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write   # lets GITHUB_TOKEN push to ghcr.io/<owner>/<repo>

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # auto-lowercased -> ghcr.io/cdibona/adsbuddy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ADSBUDDY_GIT_SHA=${{ github.sha }}

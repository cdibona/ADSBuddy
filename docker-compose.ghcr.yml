# Deploy the PUBLISHED image from GHCR instead of building locally.
#
#   ADSBUDDY_IMAGE_TAG=1.0.1 docker compose -f docker-compose.ghcr.yml up -d
#
# Uses the same .env as docker-compose.yml (POSTGRES_*, ADSBUDDY_*). The app
# container runs `alembic upgrade head` on start, then serves on :8000.
# If the GHCR package is private, `docker login ghcr.io` first.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - adsbuddy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/cdibona/adsbuddy:${ADSBUDDY_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      ADSBUDDY_SECRET_KEY: ${ADSBUDDY_SECRET_KEY}
      ADSBUDDY_ADMIN_USERNAME: ${ADSBUDDY_ADMIN_USERNAME}
      ADSBUDDY_ADMIN_PASSWORD: ${ADSBUDDY_ADMIN_PASSWORD}
      ADSBUDDY_TEST_MODE: ${ADSBUDDY_TEST_MODE:-0}
      ADSBUDDY_MODE: ${ADSBUDDY_MODE:-MultiUser}
      ADSBUDDY_RADIO_URL: ${ADSBUDDY_RADIO_URL:-}
    ports:
      # Where to bind the web port. Default 127.0.0.1 (localhost only; reach the
      # tailnet via Tailscale Serve). Set ADSBUDDY_BIND=0.0.0.0 for a LAN/tailnet
      # appliance, or a specific IP. Don't expose open mode on an untrusted network.
      - "${ADSBUDDY_BIND:-127.0.0.1}:${ADSBUDDY_PORT}:8000"

volumes:
  adsbuddy_pgdata:

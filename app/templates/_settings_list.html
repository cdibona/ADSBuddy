<div class="settings-list">
{% for s in settings %}
<form method="post" action="/admin/settings/{{ s.key }}" class="setting-compact">
  <div class="setting-key">
    <code>{{ s.key }}</code>{% if s.secret %} <span class="badge">secret</span>{% endif %}
  </div>
  {% if s.secret %}
    <input type="password" name="value" value="{{ s.value }}" placeholder="(unset)">
  {% else %}
    <input type="text" name="value" value="{{ s.value }}">
  {% endif %}
  <button type="submit">Save</button>
  {% if s.description %}<p class="setting-desc">{{ s.description }}</p>{% endif %}
</form>
{% else %}
<p class="muted">No settings in this group.</p>
{% endfor %}
</div>
